name: Deploy to GitHub Pages

# Publie le site statique (index.html + assets/) sur GitHub Pages.
# Remplace le déploiement Vercel : aucun compte ni token externe requis,
# le GITHUB_TOKEN intégré suffit. Le repo étant public, Pages est gratuit.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; on annule les runs en cours.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/
          # .nojekyll : on sert les fichiers tels quels (pas de pipeline Jekyll)
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # active automatiquement GitHub Pages (source = Actions) si besoin
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
